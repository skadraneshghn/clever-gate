# ─── Nginx reverse proxy — Clever Cloud production (Ubuntu 24.04) ──────────────
# Routes:
#   /v1/*       → FastAPI backend  (127.0.0.1:8000)  — AI API
#   /api/admin/ → FastAPI backend  (127.0.0.1:8000)  — Admin API
#   /health     → FastAPI backend  (127.0.0.1:8000)  — Health check
#   /metrics    → FastAPI backend  (127.0.0.1:8000)  — Prometheus
#   /           → Next.js frontend (127.0.0.1:3000)  — UI

worker_processes auto;
pid /tmp/nginx.pid;

# Must be writable by the nginx worker (Ubuntu default is www-data)
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging to stdout/stderr for Clever Cloud log capture
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    # Temp path overrides so nginx worker can write without root
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection      "1; mode=block" always;

    upstream backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    upstream frontend {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name _;

        # ── AI API ──────────────────────────────────────────────────────────
        location /v1/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE / streaming support
            proxy_buffering   off;
            proxy_cache       off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── Admin API ────────────────────────────────────────────────────────
        location /api/admin/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check (used by Clever Cloud deployment probe) ─────────────
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Prometheus metrics ───────────────────────────────────────────────
        location /metrics {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Next.js UI (everything else) ─────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
